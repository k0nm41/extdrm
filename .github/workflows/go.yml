# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

# This workflow will build a golang project for multiple platforms
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build and Release

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Build Linux Binary
      run: |
        GOOS=linux GOARCH=amd64 go build -v -o build/extdrm-linux ./extdrm

    - name: Build Windows Binary
      run: |
        GOOS=windows GOARCH=amd64 go build -v -o build/extdrm-windows.exe ./extdrm

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: extdrm-binaries
        path: build/
